[project]
name = "dao-ai-builder"
version = "0.1.0"
description = "Visual configuration builder for Databricks Agent-Orchestrated Applications (DAO-AI) with real-time YAML generation, deployment management, and interactive testing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0.0",
    "gunicorn>=21.0.0",
    # Pinned to >=0.1.73 (latest on PyPI as of the last builder rev).
    # Bump to >=0.1.75 once that release publishes — 0.1.75 carries the
    # `resources.llms` -> `resources.models` and `LLMModel` ->
    # `InferenceEndpointModel` renames (both with back-compat aliases).
    "dao-ai>=0.1.73",
    "databricks-sdk>=0.74.0",
    "mlflow[databricks]>=3.8.1",
    "python-dotenv>=1.2.1",
    "requests>=2.31.0",
    "jsonschema>=4.0.0",
]

[project.scripts]
dao-ai-builder = "app:main"
