[project]
name = "dao-ai-builder"
version = "0.1.0"
description = "Visual configuration builder for Databricks Agent-Orchestrated Applications (DAO-AI) with real-time YAML generation, deployment management, and interactive testing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0.0",
    "gunicorn>=21.0.0",
    # dao-ai 0.1.75 carries the `resources.llms` -> `resources.models`
    # and `LLMModel` -> `InferenceEndpointModel` renames (both with
    # back-compat aliases on the dao-ai side). 0.1.76 fixed the JSON
    # schema regen (used by IDE linting; runtime behavior identical).
    # Builder pin held at >=0.1.75 because the workspace local PyPI
    # mirror lags PyPI by ~1 week; bump to >=0.1.76 once the mirror
    # catches up.
    "dao-ai>=0.1.75",
    "databricks-sdk>=0.74.0",
    "mlflow[databricks]>=3.8.1",
    "python-dotenv>=1.2.1",
    "requests>=2.31.0",
    "jsonschema>=4.0.0",
]

[project.scripts]
dao-ai-builder = "app:main"
